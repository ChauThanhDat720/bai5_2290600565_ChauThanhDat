spring.application.name=productapp
server.port=8081

# --- SQL Server Configuration (Lưu trong database thật) ---
# Thay 'MậtKhẩuCủaBạn' bằng mật khẩu sa bạn vừa đổi trong SSMS
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=product_db;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.sql.init.encoding=UTF-8
spring.datasource.username=sa
spring.datasource.password=123456

# --- JPA / Hibernate Configuration ---
# 'create' sẽ xóa bảng cũ và tạo lại với đúng kiểu NVARCHAR
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Sử dụng Dialect cho SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# --- H2 Console (Có thể giữ lại hoặc xóa vì giờ dùng SQL Server rồi) ---
spring.h2.console.enabled=false

# --- Encoding Configuration (Fix font errors) ---
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.messages.encoding=UTF-8
spring.thymeleaf.encoding=UTF-8

# --- Thymeleaf Configuration ---
spring.thymeleaf.cache=false